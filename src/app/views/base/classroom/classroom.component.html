<div class="animated fadeIn">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="font-weight-bold">Hizmet Ortamı Kayıt Formu</h5>
          <span class="align-middle">
            <i class="fi fi-rr-info"></i>
            Hizmet ortamı oluşturabilirsiniz. <br>
          </span>
        </div>
        <div class="card-body">
          <form class="form-horizontal">
            <input type="hidden" name="id" id="id" [(ngModel)]="classroom.id">
            <div class="form-group row">
              <div class="col-md-12 col-lg-6">
                <label for="classromName">Hizmetin ya da Eğitimin Verildiği Yer</label>
                <input type="text" id="classromName" [(ngModel)]="classroom.classromName" name="classromName"
                  class="form-control" placeholder="Hizmet Ortamı Adı">
              </div>
              <div class="col-md-12 col-lg-6">
                <label for="quota">Maksimum Kişi Sayısı</label>
                <input type="number" id="quota" [(ngModel)]="classroom.quta" name="quota" class="form-control"
                  placeholder="Hizmet Ortamı Kişi Sayısı">
              </div>
            </div>
          </form>
          <div class="card-footer">
            <button type="submit" (click)="add()" class="btn btn-sm btn-primary"><i class="fi fi-rr-check"></i>
              {{buttonText}}</button>
            <button type="reset" (click)="reset()" class="btn btn-sm btn-red"><i class="fi fi-rr-cross-circle"></i>
              Formu Temizle</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="col-md-12">
          <div class="card-header">
            <strong>Hizmet Ortam Listesi</strong>
          </div>
          <div class="card-body">
            <table class="table table-sm">
              <thead>
                <tr>
                  <th>Hizmet Ortam Adı</th>
                  <th>Kişi Sayısı</th>
                  <th style="text-align: right;">İşlemler</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of classrooms">
                  <td>{{item.classromName}}</td>
                  <td>{{item.quta}}</td>
                  <td style="text-align: right;">
                    <button class="btn btn-orange btn-info" (click)="getDetailFromTable(item)"><i
                        class="fi fi-rr-user-pen"></i></button>
                    <button class="btn btn-red btn-info" (click)="remove(item.id)"><i
                        class="fi fi-rr-trash"></i></button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="card-footer pb-0 pt-3">
            <app-generic-paginator #classroomPaginator [length]="total" [pageIndex]="pageIndex" [pageSize]="pageSize"
              [pageSizeOptions]="[10, 25, 50, 75, 100, 150]" (pageChange)="onPage($event)"></app-generic-paginator>

          </div>
        </div><!--/.col-->
      </div><!--/.row-->
    </div>
