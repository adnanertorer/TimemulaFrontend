<div class="animated fadeIn">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="font-weight-bold">Role Kayıt Formu</h5>
                    <span class="align-middle">
                        <i class="fi fi-rr-info"></i>
                        Firmanız için roller ekleyebilirsiniz. <br>
                    </span>
                </div>
                <div class="card-body">
                    <form class="form-horizontal">
                        <input type="hidden" name="id" id="id" [(ngModel)]="roleModel.id">
                        <div class="form-group row">
                            <div class="col-md-12 col-lg-6">
                                <label for="name">Adı</label>
                                <input type="text" id="name" [(ngModel)]="roleModel.name" name="name"
                                    class="form-control" placeholder="Adı">
                            </div>
                            <div class="col-md-12 col-lg-6">
                                <label for="code">Kod</label>
                                <input type="text" id="code" [(ngModel)]="roleModel.code" name="code"
                                    class="form-control" placeholder="Kod">
                            </div>
                        </div>
                    </form>
                    <div class="card-footer">
                        <button type="submit" (click)="add()" class="btn btn-sm btn-primary"><i
                                class="fi fi-rr-check"></i>
                            {{buttonText}}</button>
                        <button type="reset" (click)="reset()" class="btn btn-sm btn-red"><i
                                class="fi fi-rr-cross-circle"></i>
                            Formu Temizle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="col-md-12">
                    <div class="card-header">
                        <strong>Role Listesi</strong>
                    </div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Role</th>
                                    <th>Kod</th>
                                    <th style="text-align: right;">İşlemler</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of roles">
                                    <td>{{item.name}}</td>
                                    <td>{{item.code}}</td>
                                    <td style="text-align: right;">
                                        <button class="btn btn-orange btn-info"
                                            (click)="getDetailFromTable(item, item.id)"><i
                                                class="fi fi-rr-user-pen"></i></button>
                                        <button class="btn btn-red btn-info" (click)="remove(item.id)"><i
                                                class="fi fi-rr-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div><!--/.col-->
            </div><!--/.row-->
        </div>
