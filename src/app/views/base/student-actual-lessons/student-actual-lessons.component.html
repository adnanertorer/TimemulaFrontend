<div class="animated fadeIn">
    <div class="row">
      <div class="col-md-12">
        <div class="card" style="min-width: 100%; text-align: center;">
          <div class="col-md-12">
            <div class="card-header">
              <h2>{{name}} {{surname}}</h2>
            </div>
          </div><!--/.col-->
        </div><!--/.row-->
      </div>
    </div>
  </div>
  
  <div class="container-fluid mt-5">
    <div class="row justify-content-center">    
        <button (click)="openList()" class="btn btn-primary" role="button">Takvimde Gör</button>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="mt-3">
                <ul class="list list-inline row justify-content-center">
                    <li class="d-flex justify-content-between col-5 mx-2" *ngFor="let item of list" >
                        <div class="d-flex flex-row align-items-center">
                            <div class="profile-image">
                                <img class="rounded-circle" src="{{mainUrl}}lesson-images/{{item.lessonPhoto}}" width="30">
                            </div>
                            <div class="ml-2">
                                <h6 class="mb-0">{{item.lessonName}} / {{item.artPackageName}}</h6>
                                <div class="d-flex flex-row mt-1 text-black-50 date-time">
                                    <div><i class="fa fa-calendar-o"></i><span class="ml-2">{{item.startDate | date: 'dd/M/yyyy H:mm'}} - {{item.finishDate | date: 'dd/M/yyyy H:mm'}}</span></div>
                                    <div class="ml-3"><i class="fi fi-rr-user"></i><span class="ml-2">{{item.educatorName}}</span></div>
                                    <div class="ml-3"><i class="fi fi-rr-users-class"></i><span class="ml-2">{{item.classromName}}</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex flex-row align-items-center">
                            <div class="d-flex flex-column mr-2">
                                <i *ngIf="item.isDone" class="fi fi-rr-check checkicon" title="Katıldı"></i>
                                <i *ngIf="item.isMoved" class="fi fi-rr-shuffle movedicon" title="Taşınmış"></i>
                                <i *ngIf="item.isCancel" class="fi fi-rr-cross cancelicon" title="Katılmadı"></i>
                                <button class="btn btn-primary" (click)="setApprove(item.id)" *ngIf="!item.isDone && !item.isCancel" role="button">Katıldı</button>
                                <button class="btn btn-danger" (click)="cancelLesson(item.id)" *ngIf="!item.isDone && !item.isCancel" role="button">Katılımadı</button>
                            </div>
                        </div>
                    </li>

                </ul>
            </div>
        </div>
    </div>
</div>
