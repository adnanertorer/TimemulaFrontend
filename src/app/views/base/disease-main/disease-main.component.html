<div class="animated fadeIn">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="font-weight-bold">Müşteri Sağlık Problemleri</h5>
        </div>
        <div class="card-body">
          <form action="" method="post" class="form-horizontal">
            <input type="hidden" name="id" id="id" [(ngModel)]="model.id">
            <div class="form-group row">
              <div class="col-md-12 col-lg-6">
                <input type="text" name="diseaseCategoryName" id="diseaseCategoryName"
                 [(ngModel)]="model.diseaseCategoryName" class="form-control" placeholder="Sağlık Problemi Adı">
              </div>
              <div class="col-md-12 col-lg-6">
                <input type="checkbox" name="isActive" id="isActive"
                 [(ngModel)]="model.isActive"> Aktif
              </div>
            </div>
          </form>
          <div class="card-footer">
            <button type="submit" (click)="add()" class="btn btn-sm btn-primary"><i class="fi fi-rr-check"></i> {{buttonText}}</button>
            <button type="reset" (click)="reset()" class="btn btn-sm btn-red"><i class="fi fi-rr-cross-circle"></i> Formu Temizle</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<mat-form-field appearance="standard">
  <mat-label>Sonuçlar içinde aramak için tıklayınız</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Herhangi bir kelime yazınız..." #input>
</mat-form-field>
<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort #diseaseMainSort="matSort">

    <ng-container matColumnDef="diseaseCategoryName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Sağlık Problemi Başlığı</th>
      <td mat-cell *matCellDef="let row">{{row.diseaseCategoryName}}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Aktif/Pasif</th>
      <td mat-cell *matCellDef="let row">{{row.isActive ? 'Evet' : 'Hayır'}}</td>
    </ng-container>

    <ng-container matColumnDef="id" style="text-align: right;">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>İşlemler</th>
      <td mat-cell *matCellDef="let row" style="text-align: right;">
        <button class="btn btn-orange" (click)="getDetail(row.id)" title="Düzenle"><i class="fi fi-rr-user-pen"></i></button>
        <button class="btn btn-primary" (click)="getSubs(row.id)" title="Alt Başlıklar"><i class="fi fi-rr-folder-tree"></i></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayColums"></tr>
    <tr mat-row *matRowDef="let row; columns: displayColums;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">Aradığınız kriterlere uygun kayıt bulunamadı "{{input.value}}"</td>
    </tr>
  </table>

  <mat-paginator #paginatorDiseaseMain [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
</div>
  
</div>
