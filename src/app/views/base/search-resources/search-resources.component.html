<div class="animated fadeIn">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="font-weight-bold">Pazarlama Kanalları</h5>
          <span class="align-middle"><i class="fi fi-rr-info"></i> Yeni pazarlama kanalları ekleyebilir veya mevcut pazarlama kanallarını güncelleyebilirsiniz.</span>
       
        </div>
        <div class="card-body">
          <form action="" method="post" class="form-horizontal">
            <input type="hidden" name="id" id="id" [(ngModel)]="searchResource.id">
            <div class="form-group row">
              <div class="col-md-12">
                <input type="text" id="searchResourceName" [(ngModel)]="searchResource.searchResourceName" 
                name="searchResourceName" class="form-control" placeholder="Pazarlama Platform Adı">
              </div>
            </div>
          </form>
          <div class="card-footer">
            <button type="submit" (click)="add()" class="btn btn-sm btn-primary"><i class="fi fi-rr-check"></i> {{buttonText}}</button>
            <button type="reset" (click)="reset()" class="btn btn-sm btn-red"><i class="fi fi-rr-cross-circle"></i> Formu Temizle</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
      <div class="col-md-12">
        <div class="card-header">
          <h5 class="font-weight-bold">Pazarlama Kanal Listeleri</h5>
        </div>
        <div class="card-body">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Platform</th>
                <th style="text-align: right;">İşlemler</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of pageOfItems">
                <td>{{item.searchResourceName}}</td>
                <td style="text-align: right;">
                  <button class="btn btn-orange btn-info" (click)="getDetailFromTable(item)" title="Düzenle"><i class="fi fi-rr-user-pen"></i></button>
                  <button class="btn btn-red btn-info" (click)="remove(item.id)" title="Sil"><i class="fi fi-rr-trash"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer pb-0 pt-3">
          <jw-pagination [items]="list" (changePage)="onChangePage($event)"></jw-pagination>
      </div>
      </div><!--/.col-->
    </div><!--/.row-->
</div>
