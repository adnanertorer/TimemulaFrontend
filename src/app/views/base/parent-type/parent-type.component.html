<div class="animated fadeIn">
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="font-weight-bold">Yakınlık Türü Kayıt Formu</h5>
          <span class="align-middle"><i class="fi fi-rr-info"></i> Kayıtlı olan müşteriyi ilişkilendirmek için akrabalık türünü oluşturabilirsiniz.</span>
        </div>
        <div class="card-body">
          <form action="" method="post" class="form-horizontal">
            <input type="hidden" name="id" id="id" [(ngModel)]="parentType.id">
            <div class="form-group row">
              <div class="col-md-12 col-lg-6">
                <input type="text" id="parentTypeName" [(ngModel)]="parentType.parentTypeName" 
                name="parentTypeName" class="form-control" placeholder="Yakınlık Türü Adı">
              </div>
              <div class="col-md-12 col-lg-6">
                <input type="checkbox" id="isActive" [(ngModel)]="parentType.isActive" 
                name="isActive"> Aktif
              </div>
            </div>
          </form>
          <div class="card-footer">
            <button type="submit" (click)="add()" class="btn btn-sm btn-primary"><i class="fi fi-rr-check"></i> {{buttonText}}</button>
            <button type="reset" (click)="reset()" class="btn btn-sm btn-red"><i class="fi fi-rr-cross-circle"></i> Formu Temizle</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
      <div class="col-md-12">
        <div class="card-header">
          <h5 class="font-weight-bold">Yakınlık Türü Listesi</h5>
        </div>
        <div class="card-body">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Yakınlık Türü</th>
                <th>Durum</th>
                <th style="text-align: right; padding-right: 70px;">İşlemler</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of pageOfItems">
                <td>{{item.parentTypeName}}</td>
                <td>{{item.isActive ? 'Aktif' : 'Pasif'}}</td>
                <td style="text-align: right;">
                  <button class="btn btn-orange btn-info" (click)="getDetailFromTable(item)" title="Düzenle"><i class="fi fi-rr-user-pen"></i></button>
                  <button class="btn btn-red btn-info" (click)="remove(item.id)" title="Sil"><i class="fi fi-rr-trash"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer pb-0 pt-3">
          <jw-pagination [items]="list" (changePage)="onChangePage($event)"></jw-pagination>
      </div>
      </div><!--/.col-->
    </div><!--/.row-->
</div>
